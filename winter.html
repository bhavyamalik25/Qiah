<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winter Collection | Qiah</title>
  <link rel="stylesheet" href="qiah-shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Playfair Display', serif;
      background-color: #faf9f6;
      margin: 0; padding: 0; color: #333;
    }
    h1 {
      text-align: center; font-size: 2.5rem;
      margin: 60px 0 40px; font-weight: 500;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px; padding: 0 6%; margin-bottom: 100px;
    }
    .product-card {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer; position: relative;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .product-info { padding: 15px 20px; text-align: center; }
    .product-info h3 { margin: 10px 0; font-size: 1.2rem; }
    .product-info p { color: #777; font-size: 0.9rem; margin-bottom: 4px; }
    a.back-link {
      display: block; text-align: center; margin: 40px 0;
      text-decoration: none; color: #333; font-weight: 500;
    }
    a.back-link:hover { text-decoration: underline; }
    .page-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 6%; border-bottom: 1px solid #eee;
    }
    .page-nav .logo { font-size: 1.4rem; font-weight: 500; }
    .page-nav .nav-icons { display: flex; gap: 20px; }
    .page-nav a { text-decoration: none; color: #333; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="cart-close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer" id="cart-footer" style="display:none;">
      <div class="cart-footer-total">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>
      <button class="cart-checkout-btn">Checkout</button>
    </div>
  </div>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <button class="search-close" onclick="closeSearch()">✕</button>
    <div class="search-inner">
      <div class="search-input-wrap">
        <input type="text" id="search-input" placeholder="Search pieces…">
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <!-- Mini nav -->
  <div class="page-nav">
    <a href="index.html" class="logo">Qiah</a>
    <div class="nav-icons">
      <a href="#" onclick="openSearch(); return false;">Search</a>
      <a href="#" class="cart-count" onclick="openCart(); return false;">Cart (0)</a>
    </div>
  </div>

  <h1>Winter Collection</h1>

  <div class="grid-container">

    <div class="product-card">
      <div class="card-img-wrap">
        <img src="images/chunky-knit-sweater.jfif" alt="Knit Sweater">
        <button class="wishlist-btn" data-name="Chunky Knit Sweater" onclick="toggleWishlist('Chunky Knit Sweater', this)" title="Save to wishlist">♡</button>
      </div>
      <div class="product-info">
        <h3>Chunky Knit Sweater</h3>
        <p>$120</p>
        <div class="size-selector">
          <button class="size-btn" onclick="selectSize(this)">XS</button>
          <button class="size-btn" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
        </div>
        <button class="add-to-cart-btn" onclick="handleAddToCart(this, 'Chunky Knit Sweater', 120)">Add to Cart</button>
      </div>
    </div>

    <div class="product-card">
      <div class="card-img-wrap">
        <img src="images/half-zipper.jfif" alt="Knit Pullover">
        <button class="wishlist-btn" data-name="Half Zipper Knit Pullover" onclick="toggleWishlist('Half Zipper Knit Pullover', this)" title="Save to wishlist">♡</button>
      </div>
      <div class="product-info">
        <h3>Half Zipper Knit Pullover</h3>
        <p>$180</p>
        <div class="size-selector">
          <button class="size-btn" onclick="selectSize(this)">XS</button>
          <button class="size-btn" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
        </div>
        <button class="add-to-cart-btn" onclick="handleAddToCart(this, 'Half Zipper Knit Pullover', 180)">Add to Cart</button>
      </div>
    </div>

    <div class="product-card">
      <div class="card-img-wrap">
        <img src="images/cashmere-scarf.jfif" alt="Cashmere Scarf">
        <button class="wishlist-btn" data-name="Cashmere Scarf" onclick="toggleWishlist('Cashmere Scarf', this)" title="Save to wishlist">♡</button>
      </div>
      <div class="product-info">
        <h3>Cashmere Scarf</h3>
        <p>$90</p>
        <div class="size-selector">
          <button class="size-btn" onclick="selectSize(this)">XS</button>
          <button class="size-btn" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
        </div>
        <button class="add-to-cart-btn" onclick="handleAddToCart(this, 'Cashmere Scarf', 90)">Add to Cart</button>
      </div>
    </div>

    <div class="product-card">
      <div class="card-img-wrap">
        <img src="images/fleece-tops.jfif" alt="Fleece Tops">
        <button class="wishlist-btn" data-name="Fleece Tops" onclick="toggleWishlist('Fleece Tops', this)" title="Save to wishlist">♡</button>
      </div>
      <div class="product-info">
        <h3>Fleece Tops</h3>
        <p>$200</p>
        <div class="size-selector">
          <button class="size-btn" onclick="selectSize(this)">XS</button>
          <button class="size-btn" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
        </div>
        <button class="add-to-cart-btn" onclick="handleAddToCart(this, 'Fleece Tops', 200)">Add to Cart</button>
      </div>
    </div>

    <div class="product-card">
      <div class="card-img-wrap">
        <img src="images/wool-coat.jfif" alt="Wool Coat">
        <button class="wishlist-btn" data-name="Classic Wool Coat" onclick="toggleWishlist('Classic Wool Coat', this)" title="Save to wishlist">♡</button>
      </div>
      <div class="product-info">
        <h3>Classic Wool Coat</h3>
        <p>$220</p>
        <div class="size-selector">
          <button class="size-btn" onclick="selectSize(this)">XS</button>
          <button class="size-btn" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
        </div>
        <button class="add-to-cart-btn" onclick="handleAddToCart(this, 'Classic Wool Coat', 220)">Add to Cart</button>
      </div>
    </div>

    <div class="product-card">
      <div class="card-img-wrap">
        <img src="images/burgundy-top.jfif" alt="Burgundy Knit Top">
        <button class="wishlist-btn" data-name="Burgundy Knit Top" onclick="toggleWishlist('Burgundy Knit Top', this)" title="Save to wishlist">♡</button>
      </div>
      <div class="product-info">
        <h3>Burgundy Knit Top</h3>
        <p>$40</p>
        <div class="size-selector">
          <button class="size-btn" onclick="selectSize(this)">XS</button>
          <button class="size-btn" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
        </div>
        <button class="add-to-cart-btn" onclick="handleAddToCart(this, 'Burgundy Knit Top', 40)">Add to Cart</button>
      </div>
    </div>

  </div>

  <a href="index.html" class="back-link">← Back to Home</a>

  <script src="qiah-shared.js"></script>
  <script>
    function selectSize(btn) {
      const group = btn.closest('.size-selector');
      group.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }
    function handleAddToCart(btn, name, price) {
      const card = btn.closest('.product-card');
      const selected = card.querySelector('.size-btn.selected');
      if (!selected) {
        btn.textContent = 'Pick a size!';
        setTimeout(() => btn.textContent = 'Add to Cart', 1500);
        return;
      }
      addToCart(name, price, selected.textContent);
    }
  </script>
</body>
</html>
